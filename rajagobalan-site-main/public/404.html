<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Rajkumar Rajagobalan</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230A84FF'/><text x='50' y='68' font-family='Inter,sans-serif' font-size='48' font-weight='700' fill='white' text-anchor='middle'>RR</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/m3-tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .wrap {
      text-align: center;
      max-width: 480px;
    }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: 7.5rem;
      font-weight: 700;
      color: var(--md-sys-color-primary);
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.9;
    }
    h1 {
      font-size: var(--md-sys-typescale-headline-small-size);
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      color: var(--md-sys-color-on-surface-secondary);
      font-size: var(--md-sys-typescale-body-large-size);
      margin-bottom: 28px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      background: color-mix(in srgb, var(--md-sys-color-primary) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--md-sys-color-primary) 30%, transparent);
      color: var(--md-sys-color-primary);
      text-decoration: none;
      font-size: var(--md-sys-typescale-label-large-size);
      font-weight: 500;
      border-radius: var(--md-sys-shape-corner-small);
      transition: background var(--md-sys-motion-duration-short);
      min-height: 48px;
    }
    a:hover {
      background: color-mix(in srgb, var(--md-sys-color-primary) 22%, transparent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">← Back to Home</a>
  </div>
  <script src="/theme-toggle.js"></script>
</body>
</html>
